apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: aegis-default-deny }
spec:
  podSelector: { matchLabels: { app.kubernetes.io/name: aegis } }
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ namespaceSelector: {} }]
  egress:
    - to: [{ namespaceSelector: {} }]
      ports: [{ protocol: TCP, port: 443 }, { protocol: TCP, port: 5432 }, { protocol: TCP, port: 6379 }, { protocol: TCP, port: 7233 }]

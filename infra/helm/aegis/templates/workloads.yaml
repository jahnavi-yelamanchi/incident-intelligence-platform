apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels: { app.kubernetes.io/name: aegis }
  annotations: {{ toYaml .Values.serviceAccount.annotations | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata: { name: aegis-config }
data:
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  TEMPORAL_ADDRESS: {{ .Values.config.temporalAddress | quote }}
  TEMPORAL_NAMESPACE: {{ .Values.config.temporalNamespace | quote }}
  TEMPORAL_TASK_QUEUE: {{ .Values.config.temporalTaskQueue | quote }}
---
{{- range $name, $image := .Values.images }}
apiVersion: apps/v1
kind: Deployment
metadata: { name: aegis-{{ $name }}, labels: { app.kubernetes.io/name: aegis, app.kubernetes.io/component: {{ $name }} } }
spec:
  replicas: {{ index $.Values.replicas $name }}
  selector: { matchLabels: { app.kubernetes.io/name: aegis, app.kubernetes.io/component: {{ $name }} } }
  template:
    metadata: { labels: { app.kubernetes.io/name: aegis, app.kubernetes.io/component: {{ $name }} } }
    spec:
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: {{ $name }}
          image: "{{ $image.repository }}:{{ $image.tag }}"
          imagePullPolicy: {{ $image.pullPolicy }}
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          envFrom: [{ configMapRef: { name: aegis-config } }, { secretRef: { name: {{ $.Values.secrets.name }} } }]
          resources: {{ toYaml (index $.Values.resources $name) | nindent 12 }}
          {{- if eq $name "api" }}
          ports: [{ containerPort: 4000, name: http }]
          readinessProbe: { httpGet: { path: /health/ready, port: http }, initialDelaySeconds: 10 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, initialDelaySeconds: 20 }
          {{- else if eq $name "web" }}
          ports: [{ containerPort: 3000, name: http }]
          readinessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 10 }
          {{- end }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata: { name: aegis-api }
spec: { selector: { app.kubernetes.io/name: aegis, app.kubernetes.io/component: api }, ports: [{ name: http, port: 4000, targetPort: http }] }
---
apiVersion: v1
kind: Service
metadata: { name: aegis-web }
spec: { selector: { app.kubernetes.io/name: aegis, app.kubernetes.io/component: web }, ports: [{ name: http, port: 3000, targetPort: http }] }
